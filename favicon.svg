<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4BD"/>
      <stop offset="100%" stop-color="#00B4A0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Teal corner accent -->
  <path d="M64 40 L64 64 Q64 64 50 64 L64 40Z" fill="url(#teal)" opacity="0.8" rx="14"/>
  <!-- "P" letter for Pitch -->
  <text x="16" y="46" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="800" fill="white">P</text>
  <!-- Small "D" for Deck -->
  <text x="38" y="32" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#00B4A0">D</text>
</svg>
